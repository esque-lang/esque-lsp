name: Release

on:
  push:
    tags:
      - 'v*'
  # Manual dispatch (against a tag ref) lets us retrofit artefacts onto
  # a release that already exists — the `gh release create … --clobber`
  # below handles the "already exists" case gracefully.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: true
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build esque-lsp
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          STAGE="esque-lsp-${VERSION}-${GOOS}-${GOARCH}"
          mkdir -p "dist/${STAGE}"
          go build -trimpath -ldflags="-s -w" -o "dist/${STAGE}/esque-lsp" ./
          cp README.md LICENSE "dist/${STAGE}/"
          tar -czf "dist/${STAGE}.tar.gz" -C dist "${STAGE}"
          (cd dist && sha256sum "${STAGE}.tar.gz" > "${STAGE}.tar.gz.sha256")

      - uses: actions/upload-artifact@v7
        with:
          name: esque-lsp-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.sha256
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" --clobber dist/*.tar.gz dist/*.sha256
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes \
              dist/*.tar.gz dist/*.sha256
          fi
